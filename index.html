<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KanbanURL</title>
  <script src="https://cdn.jsdelivr.net/npm/pako@2.1.0/dist/pako.min.js"></script>
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/board.css">
  <link rel="stylesheet" href="css/modal.css">
  <link rel="stylesheet" href="css/effects.css">
</head>
<body>

<header>
  <a class="logo" href="https://github.com/yourusername/kanbanurl" target="_blank" rel="noopener" title="View source code">
    <div class="logo-bars"><span></span><span></span><span></span></div>
    KanbanURL
  </a>
  <input id="board-title" type="text" maxlength="50" spellcheck="false" value="My Project" aria-label="Board title" />
  <button class="share-btn" id="share-btn">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
      <circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/>
      <line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/>
    </svg>
    Share Board
  </button>
</header>

<div class="board" id="board"></div>

<!-- Modal -->
<div class="overlay" id="overlay">
  <div class="modal" role="dialog" aria-modal="true" aria-labelledby="m-title">
    <h2 id="m-title">Add Card</h2>
    <div class="field">
      <label class="field-label" for="m-name">Card Name</label>
      <input id="m-name" type="text" maxlength="20" placeholder="What needs doing?" autocomplete="off" />
      <div class="char-count" id="char-count">0 / 20</div>
    </div>
    <div class="field">
      <label class="field-label">Column</label>
      <div class="col-radios" id="col-radios"></div>
    </div>
    <div class="field">
      <label class="field-label">Size</label>
      <div class="size-radios" id="size-radios"></div>
    </div>
    <div class="modal-actions">
      <button class="btn-ghost" id="m-cancel">Cancel</button>
      <button class="btn-primary" id="m-save">Save Card</button>
    </div>
  </div>
</div>

<footer>
  <span id="budget-label">0 / 8,000 chars</span>
  <div class="budget-track">
    <div class="budget-fill" id="budget-fill" style="width:0%"></div>
  </div>
  <span id="card-count-label">0 cards</span>
</footer>

<canvas id="celebCanvas"></canvas>
<div id="toast" aria-live="polite" aria-atomic="true"></div>

<!-- Script load order matters: state → storage → render → modal → celebrate → main -->
<script src="js/state.js"></script>
<script src="js/storage.js"></script>
<script src="js/render.js"></script>
<script src="js/modal.js"></script>
<script src="js/celebrate.js"></script>
<script src="js/main.js"></script>

</body>
</html>
